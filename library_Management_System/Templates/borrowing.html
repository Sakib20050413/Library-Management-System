{% extends 'base.html' %}
{% block content %}
    <h2>Borrowing Records</h2>
    <ul>
        {% for record in records %}
            <li>
                <a href="/borrowing/{{ record.id }}/">
                    {{ record.member.name }} borrowed "{{ record.book.title }}"
                </a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
